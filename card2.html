<!DOCTYPE html>
<html lang="en">

<head>
  <title>Music Player</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
  <link rel="stylesheet" href="styles.css" />


  <script src="https://kit.fontawesome.com/220b166d65.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script src="script.js"></script>
</head>

<body class="card2">
  <div class="canvas">

    <div class="swiper mySwiper">

        <div class="swiper-wrapper" id="wrapper">

            <div class="swiper-slide" id="swipper">
                <div class="card redC" id="card1">
                    <div class="Cardbg"><img src="https://www.countryflags.com/wp-content/uploads/sweden-flag-png-large.png"></div>
                    <div class="img"><img src="https://th.bing.com/th/id/OIP.TYXKkWA_bUA6D2xJe6i3KAAAAA?pid=ImgDet&rs=1" /></div>
                    <audio src="assets/audio/audio4.mp3" id="audio"></audio>
                    <div class="controls">
                      <div id="songDescreption">
                        <div id="song">Ridnym</div>
                        <div id="artist">Leleka</div>
                      </div>
                      

                      <div id="canvasControl"><canvas id='canvas' width="250" height="40"></canvas></div>
                      <div id="progress_bar_div"><input type="range" value="0" id="progress_bar"></div>
                      <div id="buttons">
                      <div class="prev">
                        <div class="swiper-button-prev" id="prevS"></div>
                        <div class="button" id="back"><i class="fa-solid fa-backward"></i></div>
                      </div>
                      <div class="button" id="button"><i class="fa-solid fa-play" id="button_icon"></i></div>
                      <div class="next">
                        <div class="swiper-button-next" id="nextS"></div>
                        <div class="button" id="forward"><i class="fa-solid fa-forward"></i></div>
                      </div>
                      </div> 
                      
                    </div>
                </div>
            </div>

            <div class="swiper-slide" id="swipper">

                  <div class="controls">

                    <div id="canvasControl"><canvas id='canvas' width="250" height="40"></canvas></div>

                      </div>
                    </div> 
                    <div id="progress_bar_div"><input type="range" value="0" id="progress_bar"></div>
                  </div>
              </div>
          </div>

          <div class="swiper-slide" id="swipper">
              <div class="card redC" id="card3">

                  </div>
              </div>
          </div>
